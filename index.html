<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DevOps Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>☁️ DevOps Dashboard</h1>

    <div class="card">
      <h2>System Status</h2>
      <p id="status">Running...</p>
    </div>

    <div class="card">
      <h2>CPU Usage</h2>
      <p id="cpu">Loading...</p>
    </div>

    <div class="card">
      <h2>Scaling Decision</h2>
      <p id="scale">Checking...</p>
    </div>

    <button onclick="fetchData()">Refresh Data</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
